<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Admin Pro | لوحة التحكم</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --diesel-blue: #131e2b;
            --diesel-light: #1e2d3e;
            --gold-primary: #d4af37;
            --gold-glow: #f9e29c;
            --bg-deep: #0b1118;
            --text-white: #f4f4f4;
            --status-good: #2ecc71;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at center, #162436 0%, #0b1118 100%);
            margin: 0; padding: 10px; color: var(--text-white);
            min-height: 100vh; line-height: 1.6;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        .tab-menu {
            display: flex; gap: 6px; margin-bottom: 20px;
            background: var(--diesel-light); padding: 6px;
            border-radius: 18px; border: 1px solid rgba(212, 175, 55, 0.15);
        }

        .tab-btn {
            flex: 1; padding: 12px 2px; border: none; border-radius: 12px;
            background: transparent; color: var(--text-white);
            font-family: 'Cairo'; font-weight: 700; cursor: pointer;
            transition: 0.3s; display: flex; flex-direction: column; 
            align-items: center; gap: 4px; font-size: 0.75rem;
        }

        .tab-btn i { font-size: 1.1rem; }
        .tab-btn.active { background: var(--gold-primary); color: var(--diesel-blue); box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2); }

        .tab-content { display: none; animation: slideUp 0.4s ease; }
        .tab-content.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .admin-card {
            background: var(--diesel-light); padding: 18px;
            border-radius: 22px; border: 1px solid rgba(212, 175, 55, 0.12);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
            position: relative;
        }

        h2 { font-size: 1rem; font-weight: 800; margin: 0 0 15px 0; color: var(--gold-glow); display: flex; align-items: center; gap: 8px; }

        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-size: 0.75rem; color: #a0aec0; }
        input, select {
            width: 100%; padding: 12px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            background: var(--diesel-blue); color: white; outline: none;
            font-size: 0.9rem; font-family: 'Cairo';
        }

        .mode-toggle { display: flex; gap: 5px; margin-bottom: 10px; }
        .mode-btn { 
            flex: 1; padding: 8px; font-size: 0.7rem; border-radius: 8px; 
            border: 1px solid rgba(212, 175, 55, 0.3); background: var(--diesel-blue); 
            color: var(--text-white); cursor: pointer; font-family: 'Cairo';
        }
        .mode-btn.active { background: var(--gold-primary); color: var(--diesel-blue); border-color: var(--gold-primary); }

        .upload-wrapper {
            background: var(--diesel-blue); border: 1.5px dashed var(--gold-primary);
            padding: 15px; border-radius: 10px; text-align: center; cursor: pointer;
        }

        #p_img_preview { max-width: 100px; border-radius: 8px; display: none; margin: 10px auto; }

        .submit-btn {
            width: 100%; background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: var(--diesel-blue); border: none; padding: 14px; border-radius: 10px;
            font-weight: 800; cursor: pointer; font-size: 1rem; margin-top: 5px;
        }

        #msg { text-align:center; margin-top:10px; font-weight:700; }
    </style>
</head>

<body>

<div class="container">
<div id="add-tab" class="tab-content active">
<div class="admin-card">

<form id="adminApiForm">

<div class="input-group">
<label>صورة المنتج</label>

<div class="mode-toggle">
<button type="button" id="btn-up" class="mode-btn active" onclick="switchImgMode('upload')">رفع ملف</button>
<button type="button" id="btn-link" class="mode-btn" onclick="switchImgMode('link')">لصق رابط</button>
</div>

<div id="up-area">
<div class="upload-wrapper" onclick="document.getElementById('fileInput').click()">
<i class="fas fa-cloud-upload-alt"></i>
<div id="uploadStatus">اضغط لرفع صورة</div>
<img id="p_img_preview">
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileUpload(this)">

<!-- ✅ NEW: link display -->
<div id="uploadedLinkBox" style="display:none; margin-top:8px; text-align:center;">
<a id="uploadedLink" href="#" target="_blank" style="color:var(--gold-primary); font-size:0.8rem; word-break:break-all;">
رابط الصورة
</a>
</div>

</div>

<div id="link-area" style="display:none;">
<input type="url" id="p_img_manual" oninput="syncLink(this.value)">
</div>

<input type="hidden" id="p_img">
</div>

<button type="submit" id="submitBtn" class="submit-btn">حفظ المنتج</button>
</form>

<div id="msg"></div>

</div>
</div>
</div>

<script>
const SCRIPT_URL = "YOUR_SCRIPT";

function switchImgMode(mode) {
document.getElementById('up-area').style.display = (mode === 'upload') ? 'block' : 'none';
document.getElementById('link-area').style.display = (mode === 'link') ? 'block' : 'none';
}

function syncLink(val) {
document.getElementById('p_img').value = val;
}

// ✅ resize
function resizeImage(file) {
return new Promise(resolve=>{
const img=new Image();
const reader=new FileReader();
reader.onload=e=>img.src=e.target.result;
img.onload=()=>{
const canvas=document.createElement("canvas");
const scale=Math.min(800/img.width,1);
canvas.width=img.width*scale;
canvas.height=img.height*scale;
canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
resolve(canvas.toDataURL("image/jpeg",0.7));
};
reader.readAsDataURL(file);
});
}

async function handleFileUpload(input){
const file=input.files[0];
if(!file)return;

const status=document.getElementById('uploadStatus');
const preview=document.getElementById('p_img_preview');
const hidden=document.getElementById('p_img');

// ✅ validation
if(!file.type.startsWith("image/")){
status.innerText="❌ ليس صورة";
return;
}
if(file.size>2*1024*1024){
status.innerText="❌ الصورة كبيرة";
return;
}

status.innerText="جاري الرفع...";

try{
const resized=await resizeImage(file);
const base64=resized.split(',')[1];

const res=await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({base64})
});

let data;
try{ data=await res.json(); }catch{ throw "bad"; }

if(data.status==="success"){

status.innerText="تم الرفع";

preview.src=data.fileUrl;
preview.style.display="block";
hidden.value=data.fileUrl;

// ✅ show link
const linkBox=document.getElementById('uploadedLinkBox');
const link=document.getElementById('uploadedLink');

link.href=data.fileUrl;
link.innerText=data.fileUrl;
linkBox.style.display="block";

// ✅ copy
navigator.clipboard.writeText(data.fileUrl).catch(()=>{});

}else{
status.innerText="خطأ";
}

}catch{
status.innerText="فشل الاتصال";
}
}

// ✅ reset
document.getElementById('adminApiForm').addEventListener('submit',()=>{
document.getElementById('uploadedLinkBox').style.display="none";
document.getElementById('uploadedLink').innerText="رابط الصورة";
});
</script>

</body>
</html>
