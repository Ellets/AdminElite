<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Admin | لوحة التحكم المتكاملة</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --diesel-blue: #131e2b;
            --diesel-light: #1e2d3e;
            --gold-primary: #d4af37;
            --gold-glow: #f9e29c;
            --bg-deep: #0b1118;
            --text-white: #f4f4f4;
            --status-good: #2ecc71;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at center, #162436 0%, #0b1118 100%);
            margin: 0; padding: 20px; color: var(--text-white);
            min-height: 100vh;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        /* نظام التبويبات العلوي */
        .tab-menu {
            display: flex; gap: 10px; margin-bottom: 25px;
            background: var(--diesel-light); padding: 10px;
            border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.15);
        }

        .tab-btn {
            flex: 1; padding: 15px; border: none; border-radius: 15px;
            background: transparent; color: var(--text-white);
            font-family: 'Cairo'; font-weight: 700; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .tab-btn.active { background: var(--gold-primary); color: var(--diesel-blue); box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }

        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* البطاقات والجداول */
        .admin-card {
            background: var(--diesel-light); padding: 30px;
            border-radius: 24px; border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
        }

        /* زر التعديل الموحد */
        .sheet-edit-btn {
            position: absolute; top: 25px; left: 30px;
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold-primary); border: 1px solid var(--gold-primary);
            padding: 8px 15px; border-radius: 10px; cursor: pointer;
            font-size: 0.8rem; font-weight: bold; text-decoration: none;
            transition: 0.3s;
        }
        .sheet-edit-btn:hover { background: var(--gold-primary); color: var(--diesel-blue); }

        .table-responsive { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(212, 175, 55, 0.05); color: var(--gold-primary); padding: 15px; text-align: right; border-bottom: 2px solid rgba(212, 175, 55, 0.2); }
        td { padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); vertical-align: middle; }

        /* الحقول */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--gold-glow); font-size: 0.9rem; }
        input, select {
            width: 100%; padding: 14px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            background: var(--diesel-blue); color: white; outline: none; box-sizing: border-box;
        }

        .submit-btn {
            width: 100%; background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: var(--diesel-blue); border: none; padding: 16px; border-radius: 12px;
            font-weight: 800; cursor: pointer; font-size: 1.1rem;
        }

        /* العناصر الخاصة */
        .p-img-mini { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; border: 1px solid var(--gold-primary); }
        .badge { background: rgba(212, 175, 55, 0.1); color: var(--gold-glow); padding: 4px 10px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; }
        .contact-link { color: var(--gold-primary); font-size: 1.3rem; margin-left: 15px; text-decoration: none; }
        .items-list-text { font-size: 0.85rem; color: #a0aec0; max-width: 250px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="openTab(event, 'add-tab')"><i class="fas fa-plus-circle"></i> إضافة منتج</button>
        <button class="tab-btn" onclick="openTab(event, 'inventory-tab')"><i class="fas fa-warehouse"></i> المخزن</button>
        <button class="tab-btn" onclick="openTab(event, 'orders-tab')"><i class="fas fa-shopping-cart"></i> الطلبات</button>
    </div>

    <div id="add-tab" class="tab-content active">
        <div class="admin-card">
            <h2><i class="fas fa-gem"></i> منتج جديد</h2>
            <form id="adminApiForm">
                <div class="input-group">
                    <label>اسم المنتج</label>
                    <input type="text" id="p_name" placeholder="مثال: شاي بالهيل" required>
                </div>
                <div style="display:flex; gap:15px">
                    <div class="input-group" style="flex:1">
                        <label>السعر (د.ع)</label>
                        <input type="number" id="p_price" required>
                    </div>
                    <div class="input-group" style="flex:1">
                        <label>الكمية</label>
                        <input type="number" id="p_qty" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>التصنيف</label>
                    <select id="p_type_select">
                        <option value="">-- اختر تصنيفاً --</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>رابط الصورة</label>
                    <input type="url" id="p_img" placeholder="https://image-url.com">
                </div>
                <button type="submit" id="submitBtn" class="submit-btn">حفظ في البيانات</button>
            </form>
            <div id="msg" style="text-align:center; margin-top:15px;"></div>
        </div>
    </div>

    <div id="inventory-tab" class="tab-content">
        <div class="admin-card">
            <a id="edit-inventory-link" href="#" target="_blank" class="sheet-edit-btn"><i class="fas fa-edit"></i> تعديل في Sheets</a>
            <h2><i class="fas fa-boxes"></i> المنتجات المتوفرة</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>الصورة</th>
                            <th>المنتج</th>
                            <th>التصنيف</th>
                            <th>السعر</th>
                            <th>المخزون</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="orders-tab" class="tab-content">
        <div class="admin-card">
            <a id="edit-orders-link" href="#" target="_blank" class="sheet-edit-btn"><i class="fas fa-edit"></i> تعديل في Sheets</a>
            <h2><i class="fas fa-clipboard-list"></i> الطلبات الواردة</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>الزبون</th>
                            <th>المدينة</th>
                            <th>الطلبات</th>
                            <th>المجموع</th>
                            <th>تواصل</th>
                        </tr>
                    </thead>
                    <tbody id="orders-body"></tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
    const inventorySheetID = '12XnQD1ne4fu7Q56v-RVzFVMFDCY4p18C22pzyBsBoeg';
    const ordersSheetID = '1hCfKFp2-YvEl33FdU7gEJyzxRoSO3l9bPHCDMn58W9o';
    const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSd_m0-myPMPCQzZJNrT8ip4mi-D0oVTh6o_mX2b9NSlz7RIIg/formResponse";

    // تحديث روابط التعديل
    document.getElementById('edit-inventory-link').href = `https://docs.google.com/spreadsheets/d/${inventorySheetID}/edit`;
    document.getElementById('edit-orders-link').href = `https://docs.google.com/spreadsheets/d/${ordersSheetID}/edit`;

    function openTab(evt, tabName) {
        let contents = document.getElementsByClassName("tab-content");
        for (let i = 0; i < contents.length; i++) contents[i].style.display = "none";
        let btns = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < btns.length; i++) btns[i].className = btns[i].className.replace(" active", "");
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
        if(tabName === 'inventory-tab') loadInventory();
        if(tabName === 'orders-tab') loadOrders();
    }

    async function loadCategories() {
        const fetchURL = `https://docs.google.com/spreadsheets/d/${inventorySheetID}/gviz/tq?tqx=out:json`;
        try {
            const res = await fetch(fetchURL);
            const text = await res.text();
            const json = JSON.parse(text.substring(text.indexOf("(") + 1, text.lastIndexOf(")")));
            const rows = json.table.rows;
            const categories = [...new Set(rows.map(r => r.c[4]?.v).filter(v => v && v !== "Type"))];
            const select = document.getElementById('p_type_select');
            select.innerHTML = '<option value="">-- اختر تصنيفاً --</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat; option.innerText = cat;
                select.appendChild(option);
            });
        } catch (e) {}
    }

    async function loadInventory() {
        const fetchURL = `https://docs.google.com/spreadsheets/d/${inventorySheetID}/gviz/tq?tqx=out:json`;
        try {
            const res = await fetch(fetchURL);
            const text = await res.text();
            const json = JSON.parse(text.substring(text.indexOf("(") + 1, text.lastIndexOf(")")));
            const rows = json.table.rows;
            const tbody = document.getElementById('inventory-body');
            tbody.innerHTML = '';
            for (let i = 1; i < rows.length; i++) {
                const data = rows[i].c;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><img src="${data[5]?.v || 'https://via.placeholder.com/50'}" class="p-img-mini"></td>
                    <td><strong>${data[1]?.v || '-'}</strong></td>
                    <td><span class="badge">${data[4]?.v || 'عام'}</span></td>
                    <td>${data[2]?.v} د.ع</td>
                    <td><span class="badge" style="background:rgba(255,255,255,0.05)">${data[3]?.v}</span></td>
                `;
                tbody.appendChild(tr);
            }
        } catch (e) {}
    }

    async function loadOrders() {
        const fetchURL = `https://docs.google.com/spreadsheets/d/${ordersSheetID}/gviz/tq?tqx=out:json`;
        try {
            const res = await fetch(fetchURL);
            const text = await res.text();
            const json = JSON.parse(text.substring(text.indexOf("(") + 1, text.lastIndexOf(")")));
            const rows = json.table.rows;
            const tbody = document.getElementById('orders-body');
            tbody.innerHTML = '';
            rows.reverse().forEach(row => {
                const data = row.c;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${data[2]?.v || 'زبون'}</strong></td>
                    <td>${data[3]?.v || '-'}</td>
                    <td class="items-list-text">${data[6]?.v || '-'}</td>
                    <td style="color:var(--gold-primary); font-weight:800">${data[7]?.v}</td>
                    <td>
                        <a href="tel:${data[4]?.v}" class="contact-link"><i class="fas fa-phone"></i></a>
                        <a href="mailto:${data[5]?.v}" class="contact-link"><i class="fas fa-envelope"></i></a>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {}
    }

    document.getElementById('adminApiForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('msg');
        btn.disabled = true; msg.innerText = "جاري الحفظ...";

        const formData = new URLSearchParams();
        formData.append("entry.1904055406", document.getElementById('p_name').value);
        formData.append("entry.372117537",  document.getElementById('p_price').value);
        formData.append("entry.663866375",  document.getElementById('p_qty').value);
        formData.append("entry.307919813",  document.getElementById('p_type_select').value);
        formData.append("entry.174446568",  document.getElementById('p_img').value);

        try {
            await fetch(formURL, { method: "POST", mode: "no-cors", body: formData });
            msg.style.color = "var(--status-good)";
            msg.innerText = "تم الحفظ بنجاح! ✓";
            document.getElementById('adminApiForm').reset();
            loadCategories();
        } catch (error) { msg.innerText = "حدث خطأ"; }
        finally { btn.disabled = false; }
    });

    loadCategories();
    loadOrders();
</script>

</body>
</html>
