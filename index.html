<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="google-site-verification" content="d49268c780f02ef9" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Store | متجر النخبة</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Small addition to keep the navigation button looking clean */
        .admin-nav {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .nav-btn {
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .nav-btn:hover {
            transform: scale(1.05);
            background: #ff7a4d;
        }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <span class="logo">ELITES STORE <i class="fas fa-gem"></i> النخبة</span>
            
            <div class="admin-nav">
                <a href="requestlist.html" class="nav-btn">
                    <i class="fas fa-clipboard-list"></i> عرض الطلبات
                </a>
            </div>
        </div>

        <div class="search-container" style="margin-top: 15px;">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="ابحث في المتجر..." onkeyup="filterProducts()">
        </div>
    </header>

    <nav class="category-nav" id="categoryNav">
        <div class="cat-chip active" onclick="filterByPageType('all', event)">الكل</div>
        </nav>

    <section id="featured-section">
        <div class="section-header">عروض النخبة المختارة</div>
        <div class="grid-container" id="featured-grid"></div>
    </section>

    <section>
        <div class="section-header">جميع المنتجات</div>
        <div class="grid-container" id="main-grid"></div>
    </section>

    <div class="cart-bar">
        <div>
            <div id="cart-total">0 د.ع</div>
            <small class="cart-details">القطع: <span id="cart-count">0</span></small>
        </div>
        <button class="checkout-btn">إتمام الطلب</button>
    </div>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close">&times;</span>
        <img class="modal-content" id="expandedImg">
        <div id="caption"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
