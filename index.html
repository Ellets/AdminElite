<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Admin Mobile</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --diesel-blue: #131e2b;
            --diesel-light: #1e2d3e;
            --gold-primary: #d4af37;
            --gold-glow: #f9e29c;
            --bg-deep: #0b1118;
            --text-white: #f4f4f4;
            --status-good: #2ecc71;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at center, #162436 0%, #0b1118 100%);
            margin: 0; padding: 10px; color: var(--text-white);
            min-height: 100vh;
            font-size: 14px; /* حجم خط أساسي أصغر */
        }

        .container { max-width: 100%; margin: 0 auto; }

        /* تبويبات أصغر للهواتف */
        .tab-menu {
            display: flex; gap: 5px; margin-bottom: 15px;
            background: var(--diesel-light); padding: 5px;
            border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .tab-btn {
            flex: 1; padding: 10px 5px; border: none; border-radius: 8px;
            background: transparent; color: var(--text-white);
            font-family: 'Cairo'; font-weight: 600; cursor: pointer;
            font-size: 0.85rem; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }

        .tab-btn i { font-size: 1rem; }
        .tab-btn.active { background: var(--gold-primary); color: var(--diesel-blue); }

        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* بطاقات مضغوطة */
        .admin-card {
            background: var(--diesel-light); padding: 15px;
            border-radius: 16px; border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            position: relative;
        }

        h2 { font-size: 1.1rem; margin: 0 0 15px 0; font-weight: 700; }

        /* زر التعديل بشكل أيقونة فقط للهاتف */
        .sheet-edit-btn {
            position: absolute; top: 15px; left: 15px;
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold-primary); border: 1px solid var(--gold-primary);
            padding: 5px 10px; border-radius: 8px; font-size: 0.75rem;
            text-decoration: none;
        }

        /* حقول إدخال أنحف */
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 5px; color: var(--gold-glow); font-size: 0.8rem; }
        input, select {
            width: 100%; padding: 10px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--diesel-blue); color: white; font-size: 0.9rem;
            box-sizing: border-box;
        }

        .submit-btn {
            width: 100%; background: var(--gold-primary);
            color: var(--diesel-blue); border: none; padding: 12px;
            border-radius: 10px; font-weight: 700; font-size: 1rem; margin-top: 10px;
        }

        /* جداول مريحة للعين على الموبايل */
        .table-responsive { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th { font-size: 0.75rem; color: var(--gold-primary); padding: 10px; text-align: right; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        td { padding: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: 0.85rem; }

        .p-img-mini { width: 40px; height: 40px; border-radius: 6px; }
        .badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 5px; background: rgba(212, 175, 55, 0.1); color: var(--gold-glow); }
        .contact-link { font-size: 1.1rem; color: var(--gold-primary); margin-left: 10px; }
        .items-list-text { font-size: 0.75rem; color: #a0aec0; line-height: 1.3; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="openTab(event, 'add-tab')"><i class="fas fa-plus"></i><span>إضافة</span></button>
        <button class="tab-btn" onclick="openTab(event, 'inventory-tab')"><i class="fas fa-box"></i><span>المخزن</span></button>
        <button class="tab-btn" onclick="openTab(event, 'orders-tab')"><i class="fas fa-receipt"></i><span>الطلبات</span></button>
    </div>

    <div id="add-tab" class="tab-content active">
        <div class="admin-card">
            <h2>إضافة منتج</h2>
            <form id="adminApiForm">
                <div class="input-group">
                    <input type="text" id="p_name" placeholder="اسم المنتج" required>
                </div>
                <div style="display:flex; gap:8px">
                    <input type="number" id="p_price" placeholder="السعر" required>
                    <input type="number" id="p_qty" placeholder="الكمية" required>
                </div>
                <div class="input-group" style="margin-top:10px">
                    <select id="p_type_select">
                        <option value="">-- التصنيف --</option>
                    </select>
                </div>
                <div class="input-group">
                    <input type="url" id="p_img" placeholder="رابط الصورة (Drive/Web)">
                </div>
                <button type="submit" id="submitBtn" class="submit-btn">حفظ البيانات</button>
            </form>
            <div id="msg" style="text-align:center; margin-top:10px; font-size: 0.8rem;"></div>
        </div>
    </div>

    <div id="inventory-tab" class="tab-content">
        <div class="admin-card">
            <a id="edit-inventory-link" href="#" target="_blank" class="sheet-edit-btn"><i class="fas fa-external-link-alt"></i></a>
            <h2>المخزن</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>صورة</th>
                            <th>الاسم</th>
                            <th>السعر</th>
                            <th>مخزون</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="orders-tab" class="tab-content">
        <div class="admin-card">
            <a id="edit-orders-link" href="#" target="_blank" class="sheet-edit-btn"><i class="fas fa-external-link-alt"></i></a>
            <h2>الطلبات</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>الزبون</th>
                            <th>الطلب</th>
                            <th>تواصل</th>
                        </tr>
                    </thead>
                    <tbody id="orders-body"></tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
    const inventorySheetID = '12XnQD1ne4fu7Q56v-RVzFVMFDCY4p18C22pzyBsBoeg';
    const ordersSheetID = '1hCfKFp2-YvEl33FdU7gEJyzxRoSO3l9bPHCDMn58W9o';
    const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSd_m0-myPMPCQzZJNrT8ip4mi-D0oVTh6o_mX2b9NSlz7RIIg/formResponse";

    document.getElementById('edit-inventory-link').href = `https://docs.google.com/spreadsheets/d/${inventorySheetID}/edit`;
    document.getElementById('edit-orders-link').href = `https://docs.google.com/spreadsheets/d/${ordersSheetID}/edit`;

    function formatDriveUrl(url) {
        if (!url) return 'https://via.placeholder.com/40';
        if (url.includes('drive.google.com')) {
            const fileId = url.match(/[-\w]{25,}/);
            if (fileId) return `https://lh3.googleusercontent.com/d/${fileId[0]}`;
        }
        return url;
    }

    function openTab(evt, tabName) {
        let contents = document.getElementsByClassName("tab-content");
        for (let i = 0; i < contents.length; i++) contents[i].style.display = "none";
        let btns = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < btns.length; i++) btns[i].className = btns[i].className.replace(" active", "");
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
        if(tabName === 'inventory-tab') loadInventory();
        if(tabName === 'orders-tab') loadOrders();
    }

    async function loadCategories() {
        const fetchURL = `https://docs.google.com/spreadsheets/d/${inventorySheetID}/gviz/tq?tqx=out:json`;
        try {
            const res = await fetch(fetchURL);
            const text = await res.text();
            const json = JSON.parse(text.substring(text.indexOf("(") + 1, text.lastIndexOf(")")));
            const rows = json.table.rows;
            const categories = [...new Set(rows.map(r => r.c[4]?.v).filter(v => v && v !== "Type"))];
            const select = document.getElementById('p_type_select');
            select.innerHTML = '<option value="">-- التصنيف --</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat; option.innerText = cat;
                select.appendChild(option);
            });
        } catch (e) {}
    }

    async function loadInventory() {
        const fetchURL = `https://docs.google.com/spreadsheets/d/${inventorySheetID}/gviz/tq?tqx=out:json`;
        try {
            const res = await fetch(fetchURL);
            const text = await res.text();
            const json = JSON.parse(text.substring(text.indexOf("(") + 1, text.lastIndexOf(")")));
            const rows = json.table.rows;
            const tbody = document.getElementById('inventory-body');
            tbody.innerHTML = '';
            for (let i = 1; i < rows.length; i++) {
                const data = rows[i].c;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><img src="${formatDriveUrl(data[5]?.v)}" class="p-img-mini" onerror="this.src='https://via.placeholder.com/40'"></td>
                    <td><strong>${data[1]?.v || '-'}</strong><br><span class="badge">${data[4]?.v || 'عام'}</span></td>
                    <td>${data[2]?.v}</td>
                    <td><span class="badge">${data[3]?.v}</span></td>
                `;
                tbody.appendChild(tr);
            }
        } catch (e) {}
    }

    async function loadOrders() {
        const fetchURL = `https://docs.google.com/spreadsheets/d/${ordersSheetID}/gviz/tq?tqx=out:json`;
        try {
            const res = await fetch(fetchURL);
            const text = await res.text();
            const json = JSON.parse(text.substring(text.indexOf("(") + 1, text.lastIndexOf(")")));
            const rows = json.table.rows;
            const tbody = document.getElementById('orders-body');
            tbody.innerHTML = '';
            rows.reverse().forEach(row => {
                const data = row.c;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${data[2]?.v || 'زبون'}</strong><br><small>${data[3]?.v || '-'}</small></td>
                    <td class="items-list-text">${data[6]?.v || '-'} <br> <b style="color:var(--gold-primary)">${data[7]?.v}</b></td>
                    <td><a href="tel:${data[4]?.v}" class="contact-link"><i class="fas fa-phone-alt"></i></a></td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {}
    }

    document.getElementById('adminApiForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('msg');
        btn.disabled = true; msg.innerText = "جاري الحفظ...";

        const formData = new URLSearchParams();
        formData.append("entry.1904055406", document.getElementById('p_name').value);
        formData.append("entry.372117537",  document.getElementById('p_price').value);
        formData.append("entry.663866375",  document.getElementById('p_qty').value);
        formData.append("entry.307919813",  document.getElementById('p_type_select').value);
        formData.append("entry.174446568",  document.getElementById('p_img').value);

        try {
            await fetch(formURL, { method: "POST", mode: "no-cors", body: formData });
            msg.style.color = "var(--status-good)";
            msg.innerText = "تم الحفظ بنجاح! ✓";
            document.getElementById('adminApiForm').reset();
            loadCategories();
        } catch (error) { msg.innerText = "حدث خطأ"; }
        finally { btn.disabled = false; }
    });

    loadCategories();
</script>

</body>
</html>
