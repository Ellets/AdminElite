<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مركز الرفع</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0b1118; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #1e2d3e; padding: 20px; border-radius: 15px; border: 1px solid #d4af37; text-align: center; width: 80%; }
        input { margin: 15px 0; }
        .btn { background: #d4af37; color: #131e2b; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        #status { margin-top: 10px; font-size: 0.8rem; color: #d4af37; }
    </style>
</head>
<body>
    <div class="box">
        <h3>رفع صورة المنتج</h3>
        <input type="file" id="imgInput" accept="image/*">
        <button class="btn" id="upBtn">رفع واستخدام</button>
        <div id="status"></div>
    </div>

    <script>
        // Replace with your API key from https://api.imgbb.com/
        const KEY = 'YOUR_IMGBB_API_KEY'; 

        document.getElementById('upBtn').onclick = async () => {
            const file = document.getElementById('imgInput').files[0];
            const status = document.getElementById('status');
            if(!file) return alert("اختر صورة أولاً");

            status.innerText = "جاري الرفع...";
            const formData = new FormData();
            formData.append("image", file);

            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${KEY}`, { method: "POST", body: formData });
                const data = await res.json();
                if(data.success) {
                    const url = data.data.url;
                    if(window.opener) {
                        window.opener.document.getElementById('p_img').value = url;
                        window.close();
                    } else {
                        status.innerText = "تم الرفع: " + url;
                    }
                }
            } catch(e) { status.innerText = "فشل الرفع"; }
        };
    </script>
</body>
</html>
