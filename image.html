<!DOCTYPE html>
<html>
<head>
    <title>Drive Uploader</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        #linkContainer { margin-top: 20px; display: none; padding: 15px; background: #e7f3ff; border-radius: 8px; }
        input { margin: 10px 0; }
    </style>
</head>
<body>

    <h2>Upload to Shared Folder</h2>
    <input type="file" id="fileInput" accept="image/*">
    <br>
    <button id="uploadBtn">Upload & Copy Link</button>

    <div id="status"></div>

    <div id="linkContainer">
        <p>File Uploaded Successfully!</p>
        <input type="text" id="shareLink" readonly style="width: 80%;">
        <button onclick="copyLink()">Copy</button>
    </div>

    <script>
        const WEB_APP_URL = "YOUR_DEPLOYED_URL_HERE"; // Paste your Web App URL here

        document.getElementById('uploadBtn').onclick = async () => {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('status');
            const linkContainer = document.getElementById('linkContainer');
            
            if (!fileInput.files[0]) return alert("Select a file!");

            status.innerText = "Uploading...";
            
            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async (e) => {
                const base64 = e.target.result.split(',')[1];
                
                try {
                    const response = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            base64: base64,
                            mimeType: file.type,
                            fileName: file.name
                        })
                    });

                    const result = await response.json();

                    if (result.status === "success") {
                        status.innerText = "";
                        linkContainer.style.display = "block";
                        document.getElementById('shareLink').value = result.fileUrl;
                    } else {
                        status.innerText = "Error: " + result.message;
                    }
                } catch (err) {
                    status.innerText = "Error: Check Console";
                    console.error(err);
                }
            };
            reader.readAsDataURL(file);
        };

        function copyLink() {
            const copyText = document.getElementById("shareLink");
            copyText.select();
            document.execCommand("copy");
            alert("Link copied to clipboard!");
        }
    </script>
</body>
</html>
