<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Admin | الجرد المطور</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --diesel-blue: #131e2b;
            --diesel-light: #1e2d3e;
            --gold-primary: #d4af37;
            --text-white: #f4f4f4;
            --status-good: #2ecc71;
            --status-low: #e74c3c;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0b1118;
            color: var(--text-white);
            margin: 0; padding: 10px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        
        .header { 
            display: flex; justify-content: space-between; 
            align-items: center; margin: 15px 5px; 
        }
        
        .back-btn { 
            text-decoration: none; color: var(--gold-primary); 
            font-weight: bold; font-size: 0.8rem; border: 1px solid var(--gold-primary);
            padding: 6px 12px; border-radius: 10px; transition: 0.3s;
        }

        .card {
            background: var(--diesel-light);
            padding: 15px; border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: right; color: var(--gold-primary); font-size: 0.8rem; padding: 12px; border-bottom: 2px solid rgba(212, 175, 55, 0.1); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        
        .stock-badge { 
            font-weight: 800; padding: 4px 10px; border-radius: 8px; 
            display: inline-block; min-width: 40px; text-align: center;
        }
        .bg-green { background: rgba(46, 204, 113, 0.15); color: var(--status-good); }
        .bg-red { background: rgba(231, 76, 60, 0.15); color: var(--status-low); }

        /* --- MOBILE OPTIMIZATION --- */
        @media screen and (max-width: 600px) {
            table thead { display: none; } /* Hide headers on mobile */
            
            table, tbody, tr, td { display: block; width: 100%; }

            tr {
                margin-bottom: 15px;
                background: rgba(255, 255, 255, 0.02);
                padding: 10px;
                border-radius: 15px;
                border: 1px solid rgba(212, 175, 55, 0.1);
            }

            td {
                text-align: left; /* Numbers to the left */
                display: flex;
                justify-content: space-between; /* Label right, Value left */
                padding: 8px 5px;
                border: none;
                direction: ltr; /* Flip for flex-between logic in RTL */
            }

            td strong, td span, td span.stock-badge {
                direction: rtl; /* Keep text content Arabic/RTL */
            }

            td::after {
                content: attr(data-label);
                font-weight: bold;
                color: var(--gold-primary);
                font-size: 0.8rem;
                direction: rtl;
            }
        }

        .loader { text-align: center; padding: 40px; color: var(--gold-primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="font-size: 1.1rem; margin:0;"><i class="fas fa-calculator"></i> الجرد الذكي</h2>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> الرئيسية</a>
    </div>

    <div class="card">
        <div id="loading" class="loader">جاري مزامنة المخزن...</div>
        <table id="resultTable" style="display:none;">
            <thead>
                <tr>
                    <th>المادة</th>
                    <th>بالمخزن</th>
                    <th>المحجوز</th>
                    <th>المتبقي</th>
                </tr>
            </thead>
            <tbody id="inventory-body"></tbody>
        </table>
    </div>
</div>

<script>
    const inventorySheetID = '12XnQD1ne4fu7Q56v-RVzFVMFDCY4p18C22pzyBsBoeg';
    const ordersSheetID = '1hCfKFp2-YvEl33FdU7gEJyzxRoSO3l9bPHCDMn58W9o';

    async function fetchJSON(id) {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`);
        const text = await res.text();
        return JSON.parse(text.substring(text.indexOf("(") + 1, text.lastIndexOf(")")));
    }

    async function generateReport() {
        try {
            const [invJson, ordJson] = await Promise.all([fetchJSON(inventorySheetID), fetchJSON(ordersSheetID)]);
            
            let demandMap = {};
            ordJson.table.rows.slice(1).forEach(row => {
                let cell = row.c[6]?.v;
                if (cell) {
                    const regex = /([^,()]+)\s*\(x(\d+)\)/g;
                    let match;
                    while ((match = regex.exec(cell)) !== null) {
                        let name = match[1].trim().toLowerCase();
                        let qty = parseInt(match[2]);
                        demandMap[name] = (demandMap[name] || 0) + qty;
                    }
                }
            });

            const tbody = document.getElementById('inventory-body');
            tbody.innerHTML = '';
            
            invJson.table.rows.slice(1).forEach(row => {
                let originalName = row.c[1]?.v || 'مادة';
                let stock = Number(row.c[3]?.v || 0);
                let key = originalName.toString().toLowerCase().trim();
                let taken = demandMap[key] || 0;
                let remaining = stock - taken;

                tbody.innerHTML += `
                    <tr>
                        <td data-label="المادة"><strong>${originalName}</strong></td>
                        <td data-label="بالمخزن" style="color:#a0aec0">${stock}</td>
                        <td data-label="المحجوز" style="color:var(--gold-primary)">${taken}</td>
                        <td data-label="المتبقي">
                            <span class="stock-badge ${remaining > 0 ? 'bg-green' : 'bg-red'}">
                                ${remaining}
                            </span>
                        </td>
                    </tr>`;
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('resultTable').style.display = 'table';

        } catch (error) {
            document.getElementById('loading').innerHTML = "فشل الاتصال بالبيانات";
        }
    }

    generateReport();
</script>
</body>
</html>
