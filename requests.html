<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Admin | الجرد الكامل</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --diesel-blue: #131e2b;
            --diesel-light: #1e2d3e;
            --gold-primary: #d4af37;
            --text-white: #f4f4f4;
            --status-good: #2ecc71;
            --status-low: #e74c3c;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0b1118;
            color: var(--text-white);
            margin: 0; padding: 15px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .header { 
            display: flex; justify-content: space-between; 
            align-items: center; margin-bottom: 25px; 
        }
        
        .back-btn { 
            text-decoration: none; color: var(--gold-primary); 
            font-weight: bold; font-size: 0.9rem; border: 2px solid var(--gold-primary);
            padding: 10px 20px; border-radius: 12px; transition: 0.3s;
        }
        .back-btn:hover { background: var(--gold-primary); color: var(--diesel-blue); }

        .admin-card {
            background: var(--diesel-light);
            padding: 25px; border-radius: 24px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { 
            text-align: right; color: var(--gold-primary); 
            font-size: 0.9rem; padding: 15px 10px; 
            border-bottom: 3px solid rgba(212, 175, 55, 0.15); 
        }
        td { 
            padding: 18px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 1rem; 
        }
        
        .product-name { font-weight: 800; color: #fff; }
        
        .stock-badge { 
            font-weight: 800; padding: 6px 14px; border-radius: 10px; 
            display: inline-block; min-width: 50px; text-align: center;
            font-size: 1.1rem;
        }
        .bg-green { background: rgba(46, 204, 113, 0.2); color: var(--status-good); }
        .bg-red { background: rgba(231, 76, 60, 0.2); color: var(--status-low); }

        .loader { text-align: center; padding: 50px; color: var(--gold-primary); font-weight: bold; font-size: 1.2rem; }

        /* Subtle mobile tweak just to prevent squashing */
        @media screen and (max-width: 600px) {
            .admin-card { padding: 15px; }
            td, th { padding: 12px 5px; font-size: 0.85rem; }
            .stock-badge { padding: 4px 8px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2><i class="fas fa-calculator" style="color:var(--gold-primary)"></i> تقرير الجرد العام</h2>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> الرجوع للوحة</a>
    </div>

    <div class="admin-card">
        <div id="loading" class="loader">جاري مزامنة كافة المواد...</div>
        <table id="resultTable" style="display:none;">
            <thead>
                <tr>
                    <th>المادة</th>
                    <th>المخزن</th>
                    <th>المحجوز</th>
                    <th>الصافي</th>
                </tr>
            </thead>
            <tbody id="inventory-body"></tbody>
        </table>
    </div>
</div>

<script>
    const inventorySheetID = '12XnQD1ne4fu7Q56v-RVzFVMFDCY4p18C22pzyBsBoeg';
    const ordersSheetID = '1hCfKFp2-YvEl33FdU7gEJyzxRoSO3l9bPHCDMn58W9o';

    async function fetchJSON(id) {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`);
        const text = await res.text();
        return JSON.parse(text.substring(text.indexOf("(") + 1, text.lastIndexOf(")")));
    }

    async function generateReport() {
        try {
            const [invJson, ordJson] = await Promise.all([fetchJSON(inventorySheetID), fetchJSON(ordersSheetID)]);
            
            // Map the taken amounts
            let demandMap = {};
            ordJson.table.rows.slice(1).forEach(row => {
                let cell = row.c[6]?.v;
                if (cell) {
                    const regex = /([^,()]+)\s*\(x(\d+)\)/g;
                    let match;
                    while ((match = regex.exec(cell)) !== null) {
                        let name = match[1].trim().toLowerCase();
                        let qty = parseInt(match[2]);
                        demandMap[name] = (demandMap[name] || 0) + qty;
                    }
                }
            });

            const tbody = document.getElementById('inventory-body');
            tbody.innerHTML = '';
            
            invJson.table.rows.slice(1).forEach(row => {
                let originalName = row.c[1]?.v || 'مادة';
                let stock = Number(row.c[3]?.v || 0);
                let key = originalName.toString().toLowerCase().trim();
                let taken = demandMap[key] || 0;
                let remaining = stock - taken;

                tbody.innerHTML += `
                    <tr>
                        <td class="product-name">${originalName}</td>
                        <td style="color:#a0aec0">${stock}</td>
                        <td style="color:var(--gold-primary); font-weight:bold;">${taken}</td>
                        <td>
                            <span class="stock-badge ${remaining > 0 ? 'bg-green' : 'bg-red'}">
                                ${remaining}
                            </span>
                        </td>
                    </tr>`;
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('resultTable').style.display = 'table';

        } catch (error) {
            document.getElementById('loading').innerHTML = "تعذر الاتصال بقاعدة البيانات";
        }
    }

    generateReport();
</script>
</body>
</html>
